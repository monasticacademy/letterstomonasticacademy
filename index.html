<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Truth About Monastic Academy</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f5f3eb;
      color: #2e3b2f;
      line-height: 1.7;
    }
    nav {
      background: #556b55;
      padding: 1rem 2rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
    }
    nav a {
      color: #f5f3eb;
      text-decoration: none;
    }
    .hero {
      text-align: center;
      padding: 5rem 2rem 3rem;
      background: #e8e4d8;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: normal;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 3rem 2rem;
    }
    .contact-box {
      text-align: center;
      margin-top: 3rem;
    }
    .airtable-wrap {
      position: relative;
      max-width: 720px;
      margin: 0 auto;
      min-height: 700px;
    }
    .airtable-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #6b7a6b;
      font-style: italic;
      pointer-events: none;
    }
    .airtable-loading::before {
      content: "";
      width: 32px;
      height: 32px;
      border: 3px solid rgba(85, 107, 85, 0.2);
      border-top-color: #556b55;
      border-radius: 50%;
      animation: airtable-spin 0.8s linear infinite;
    }
    @keyframes airtable-spin {
      to { transform: rotate(360deg); }
    }
    .airtable-embed {
      position: relative;
      display: block;
      width: 100%;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(46, 59, 47, 0.12);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .airtable-embed.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">Home</a>
    <a href="testimonials.html">Testimonials</a>
    <a href="mailto:testimonials@monasticacademy.org">Contact</a>
  </nav>

  <section class="hero">
    <h1>Truth About Monastic Academy</h1>
    <p>
      This is a place where we aggregate testimonials people have sent us about their experience here.
    </p>
  </section>

  <div class="container">
    <div class="contact-box">
      <div class="airtable-wrap">
        <div class="airtable-loading">Loading testimonial submission form…</div>
        <iframe class="airtable-embed" src="https://airtable.com/embed/app3KoZGg1uwP1RZn/paggXE2M3qvrBGusU/form?backgroundColor=transparent" frameborder="0" onmousewheel="" width="100%" height="700" style="background: transparent;" onload="this.classList.add('loaded')"></iframe>
      </div>
    </div>
  </div>

</body>
</html>
